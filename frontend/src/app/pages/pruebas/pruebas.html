<body class="bg-background text-on-background min-h-screen flex items-center justify-center">

  <div class="grid gap-6 p-6 max-w-4xl w-full">

    <!-- Card -->
    <div class="bg-surface text-on-surface p-6 rounded-2xl shadow">
      <h1 class="text-2xl font-bold mb-2">Theme Preview</h1>
      <p>Usando @theme oficial de Tailwind v4 🚀</p>
    </div>

    <!-- Buttons -->
    <div class="flex gap-4 flex-wrap">

      <button class="px-4 py-2 rounded-xl bg-primary text-on-primary">
        Primary
      </button>

      <button class="px-4 py-2 rounded-xl bg-secondary text-on-secondary">
        Secondary
      </button>

      <button class="px-4 py-2 rounded-xl bg-tertiary text-on-tertiary">
        Tertiary
      </button>

    </div>

    <!-- Containers -->
    <div class="grid md:grid-cols-3 gap-4">

      <div class="p-4 rounded-xl bg-primary-container text-on-primary-container">
        Primary Container
      </div>

      <div class="p-4 rounded-xl bg-secondary-container text-on-secondary-container">
        Secondary Container
      </div>

      <div class="p-4 rounded-xl bg-tertiary-container text-on-tertiary-container">
        Tertiary Container
      </div>

    </div>

    <!-- Outline -->
    <div class="p-4 rounded-xl border border-outline">
      Outline example
    </div>

    <!-- Error -->
    <div class="p-4 rounded-xl bg-error text-on-error">
      Error state example
    </div>

  </div>
