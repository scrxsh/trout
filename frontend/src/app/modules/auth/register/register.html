<body class="bg-background text-text-color min-h-screen flex items-center justify-center p-4 md:p-8">
<main class="w-full max-w-6xl">
<div class="bg-surface rounded-2xl md:rounded-2xl shadow-[0_12px_32px_rgba(22,22,22,0.08)] overflow-hidden flex flex-col lg:flex-row min-h-[600px] relative">
<!-- Left Side: Form -->
<div class="w-full lg:w-1/2 p-8 md:p-12 lg:p-16 flex flex-col justify-center relative z-10 border-tertiary lg:border-t-0 lg:border-tertiary">
<!-- Brand Logo (Contextual inside card) -->
<div class="mb-10 lg:mb-16">
<span class="font-display font-black text-primary tracking-tighter text-2xl flex items-center gap-2">
<span class="material-symbols-outlined text-secondary" data-icon="ecg_heart" style="font-variation-settings: 'FILL' 1;">ecg_heart</span>
                        Vitality Core
                    </span>
</div>
<div>
<h1 class="font-headline font-bold text-3xl md:text-4xl tracking-tight text-primary mb-2">Create Your Account</h1>
<p class="font-body text-hint text-lg leading-relaxed mb-8">Join the community health network.</p>
<form class="space-y-6">
<div class="space-y-1">
<label class="block font-label text-sm font-bold text-tertiary uppercase tracking-wider" for="fullName">Full Name</label>
<input class="w-full bg-surface text-text-color rounded-md px-4 py-3 border border-hint/30 focus:ring-2 focus:ring-primary focus:border-primary placeholder-hint transition-all duration-200" id="fullName" name="fullName" placeholder="Jane Doe" type="text"/>
</div>
<div class="space-y-1">
<label class="block font-label text-sm font-bold text-tertiary uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-surface text-text-color rounded-md px-4 py-3 border border-hint/30 focus:ring-2 focus:ring-primary focus:border-primary placeholder-hint transition-all duration-200" id="email" name="email" placeholder="jane@example.com" type="email"/>
</div>
<div class="space-y-1">
<label class="block font-label text-sm font-bold text-tertiary uppercase tracking-wider" for="password">Password</label>
<input class="w-full bg-surface text-text-color rounded-md px-4 py-3 border border-hint/30 focus:ring-2 focus:ring-primary focus:border-primary placeholder-hint transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-1">
<label class="block font-label text-sm font-bold text-tertiary uppercase tracking-wider" for="confirmPassword">Confirm Password</label>
<input class="w-full bg-surface text-text-color rounded-md px-4 py-3 border border-hint/30 focus:ring-2 focus:ring-primary focus:border-primary placeholder-hint transition-all duration-200" id="confirmPassword" name="confirmPassword" placeholder="••••••••" type="password"/>
</div>
<div class="pt-4">
<button class="w-full bg-secondary text-on-secondary font-body font-bold text-lg py-4 px-6 rounded-md shadow-md hover:bg-secondary/90 hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 bg-gradient-to-r from-secondary to-[#e05252]" type="button">
                                Create Account
                            </button>
</div>
</form>
<div class="mt-8 text-center font-body text-hint">
                        Already have an account? <a class="text-tertiary font-bold hover:text-primary transition-colors underline decoration-2 underline-offset-4" routerLink="/login">Sign In</a>
</div>
</div>
</div>
<!-- Right Side: Image -->
<div class="hidden lg:block lg:w-1/2 relative p-4">
<div class="absolute inset-0 bg-primary-container/40 rounded-2xl m-4 z-0 pointer-events-none"></div>
<img alt="Medical professionals in a modern clinic" class="w-full h-full object-cover rounded-2xl relative z-10 shadow-sm" data-alt="Two female medical professionals in a bright, modern, high-end clinic setting, smiling and looking at a digital tablet together" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJPbmo-aIA90UCP-35JUQe_FwYod03Q5D1d3ZT1-3m3KjKZpIcfisFkU9qsH23kwgOM2eKcqHnBP3FHtV3RRatHR3Wwk6lDs5Uw4-aAOWx9iuohBhHSSkIrBUyIZ7XoAwuaaaP6n1okS4YOPHgnv6nzRvvxQBozhXuElywn1EvsOOW4AgXjL_mA6h4INq2mr9gLGMk9pYR6gGfkR6_VbDCFS1o19e5bpE3olA7rhd2iqQTxSYqEFdPNv4NMP_ASwYMPgp73DAjYxM"/>
</div>
</div>
</main>
</body>
